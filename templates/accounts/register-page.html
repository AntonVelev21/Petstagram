{% extends 'shared/base.html' %}
{% block content %}

    <div class="login-register-div">
        <div class="login-register-box">
            <h1>Petstagram</h1>

            <!-- Start Register Form -->
            <form method="post">
                {% csrf_token %}

                {{ form.email }}
                {{ form.password1 }}
                {{ form.password2 }}
                {{ form.errors }}

                <button type="submit">Register</button>
            </form>
            <!-- End Register Form -->

        </div>
        <div class="second-option">

            <!-- Link to Login Page -->
            <p>Have an account? <a href="#">Log in</a></p>
        </div>
    </div>
    <!-- End Register Section -->

{% endblock %}

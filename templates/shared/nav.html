{% load static %}
<nav class="navbar">
        <div class="container">
            <div class="logo">
                <!-- Link to Home Page -->
                <a href="{% url 'common:home_page' %}">
                    <img width="50px" src="{% static 'images/free-30-instagram-stories-icons23_122570.png' %}" alt="img1">
                </a>

                <!-- Link to Home Page -->
                <a class="home" href="{% url 'common:home_page' %}">
                    <i>Petstagram</i>
                </a>
            </div>

            <div class="nav-links">
                <ul class="nav-group">
                    <li class="nav-item">

                        <!-- Link to Add Pet Page -->
                        <a href="{% url 'pets:add_pet' %}">
                            <i>Add Pet</i>
                        </a>
                    </li>
                    <li class="nav-item">

                        <!-- Link to Add Photo Page -->
                        <a href="{% url 'photos:add_photo' %}">
                            <i>Add Photo</i>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="{% url 'accounts:login' %}">

                        </a>

                    <li class="nav-item">

                        <a href="{% url 'accounts:register' %}">
                            <i>Register</i>
                        </a>
                    </li>
                {% endif %}

                    <li class="nav-item">

                            <a href="{% url 'accounts:profile_details' pk=request.user.profile.pk %}">
                                <i>Profile</i>
                            </a>
                        {% endif %}
                    </li>
                {% if request.user.is_authenticated %}

                    <form action="{% url 'accounts:logout' %}" method="post">

                        <button type="submit" class="button">
                            Logout
                        </button>
                    </form>

            </div>
